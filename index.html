<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dedektifik Oyunu</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial, sans-serif;">

  <h2>Şifre gir</h2>
  <input type="password" id="sifre" placeholder="Şifre">
  <br><br>
  <button onclick="kontrol()">Giriş</button>

  <script>
    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function coz(encoded) {
      return atob(encoded);
    }

    async function kontrol() {
      const girilenSifre = document.getElementById("sifre").value;
      const dogruHash = "bc520fd25b632f3f4ee047efcb29253c501ea5b7982704020f2fe51a2be77254";
      const girilenHash = await sha256(girilenSifre);

      if (girilenHash === dogruHash) {
        const p1 = "aHR0cHM6Ly9kcml2ZS5nb29nbGUuY29tLw==";
        const p2 = "ZHJpdmUvZm9sZGVycy8xaXczZXN1eTNMVG5CRHVwbFdQaThCN3dwOUFERHZCNmQ/dXNwPXNoYXJpbmc=";
        const link = coz(p1) + coz(p2);
        window.location.href = link;
      } else {
        alert("Yanlış şifre (Hepsi küçük olmalı)");
      }
    }
  </script>

</body>
</html>
